<!DOCTYPE html>
<html lang="cn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 引入jQuery、font-awesome、bootstrap，用轮子用于提高效率。-->
    <!-- script标签引入.js文件，link标签引入.css文件 -->

    <!-- jQuery库，封装好了很多JS函数，找元素和做动画都很方便。
         找元素：document.querySelector('.search-btn')➡ $(".search-btn")
         做动画：实现淡入效果：$(".search-data").fadeIn(500); -->
    <script src="./js1/jquery.min.js"></script>
    
    <!-- font-awesome：一个图标字体库。将图标做成矢量字体，因此可随意调整图片颜色而不会失真模糊。 -->
    <!-- <link rel="stylesheet" href="./css1/all.min.css"> -->
    <!-- 这个font-awesome必须引入一个webfonts字体库，从CDN可以获取可以不用下到本地，但是只将.css下到本地加载会显示无法加载出web字体，所以此处先引用CDN -->
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.2.0/css/all.min.css">

    <!-- 新加一个字体库，显示新发布图标（Gemini、Chatgpt） -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/simple-icons-font@v13/font/simple-icons.min.css">
    <!-- bootstrap：一个UI框架。写好了响应式布局，直接适配手机端和电脑端 -->
    <link rel="stylesheet" href="./css1/bootstrap.min.css">
    

    <!-- 注释一下，先不引用这玩意，不然显示不出来 -->
    <!-- <link rel="stylesheet" type="text/css" href="./css/style.css">
    <link rel="stylesheet" type="text/css" href="./css/mobile.css">
    <link rel="stylesheet" type="text/css" href="./css/loading.css">
    <link rel="stylesheet" type="text/css" href="./css/animation.css"> -->
    
    <!-- 网页图标，可根据自身需要调整 -->
    <link rel="icon" href="./Appearance.ico" type="image/x-icon">

    <!-- 注释一下，没找到这个对应的ico在哪 -->
    <!-- <link rel="apple-touch-icon" href="./img/icon/apple-touch-icon.png"> -->
    
    <!-- 注释一下，先不写弹窗弹出插件和音乐播放插件 -->
    <!-- <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/izitoast/1.4.0/css/iziToast.min.css">
    <script src="https://cdn.bootcdn.net/ajax/libs/izitoast/1.4.0/js/iziToast.min.js"></script>
    
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/aplayer/1.10.1/APlayer.min.css">
    <script src="https://cdn.bootcdn.net/ajax/libs/aplayer/1.10.1/APlayer.min.js"></script> -->

    <!-- 引入自创建CSS样式 -->
    <link rel="stylesheet" href="./css2/style2.css">

    <!-- 放在body底部，防止因为代码执行顺序的原因导致mousePointer还未加载出来，在js文件中运用了offWidth这一属性 -->
    <!-- 引入自创建JS样式 -->
    <!-- <script src="./js2/main2.js"></script> -->

    <link rel="preload" href="./img/background1.webp" as="image">

    <!-- 网页标题，可根据自身需要调整 -->
    <title>Easy's Homepage</title>

    <style>
        body {
            /* 确保 img 文件夹里有 background1.webp */
            background-image: url("./img/background1.webp"); 
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover;
            background-attachment: fixed;
        }
    </style>

</head>

<body>
    <!-- 鼠标指针 -->
    <div id="mousePointer" class="hidden"></div>

    <!-- 网页主体 -->
    <div  id="main" class="main">
        <!-- 搜索框部分 -->
        <div class="search_container">
            <!-- autocomplete:off 可禁用浏览器自带保存信息提示 -->
            <input type="text" id="input" placeholder="搜索网页" title="请输入搜索词" autocomplete="off">
            <span id="search_button" class="fas fa-search" data-title="搜索"></span>
            <div id="history_box" class="history-box hidden"></div>
        </div>
        <!-- 网站列表部分 -->
        <div id="nav_container" class="nav-container"></div>
    </div>
    <!-- 引入自创建JS样式 -->
    <script src="./js2/main2.js"></script>
</body>

</html>
